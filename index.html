<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #111b21; color: white; padding: 20px; }
        .card { background-color: #202c33; border: none; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00a884; font-weight: bold; }
        .btn-send { background-color: #00a884; color: white; font-weight: bold; border-radius: 10px; padding: 12px; }
        .btn-send:hover { background-color: #06cf9c; color: white; }
        label { margin-top: 15px; color: #aebac1; font-size: 0.9rem; }
        input, textarea { background-color: #2a3942 !important; border: none !important; color: white !important; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card w-100" style="max-width: 450px;">
            <h2 class="text-center">WA Scheduler</h2>
            <p class="text-center text-muted small">Aplikasi Otomatisasi Latar Belakang</p>
            
            <label>Nomor WhatsApp (Awali 62):</label>
            <input type="text" id="tujuan" class="form-control" placeholder="Contoh: 62812345678">

            <label>Pesan:</label>
            <textarea id="pesan" class="form-control" rows="3" placeholder="Ketik pesan di sini..."></textarea>

            <label>Jam Kirim:</label>
            <input type="time" id="jam" class="form-control">

            <button onclick="proses()" id="btnSubmit" class="btn btn-send w-100 mt-4">SINKRONKAN JADWAL</button>
            <div id="status" class="mt-3 text-center small"></div>
        </div>
    </div>

    <script>
        function proses() {
            const status = document.getElementById('status');
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            status.innerText = "Menghubungkan ke Server Google...";

            const data = {
                tujuan: document.getElementById('tujuan').value,
                pesan: document.getElementById('pesan').value,
                jam: document.getElementById('jam').value
            };

            google.script.run
                .withSuccessHandler((msg) => {
                    status.innerHTML = `<span class="text-success">${msg}</span>`;
                    btn.disabled = false;
                })
                .jadwalkanPesan(data);
        }
    </script>
</body>
</html>
